<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="sweep" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0.8"/>
    </linearGradient>
  </defs>
  <rect width="800" height="300" fill="#0A0E1A"/>
  <g stroke="#1E293B" stroke-width="0.5">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="100" y1="0" x2="100" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="500" y1="0" x2="500" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="700" y1="0" x2="700" y2="300"/>
  </g>
  <g transform="translate(400,150)">
    <circle r="40" stroke="#22D3EE" stroke-width="0.5" fill="none" opacity="0.3"/>
    <circle r="80" stroke="#22D3EE" stroke-width="0.5" fill="none" opacity="0.25"/>
    <circle r="120" stroke="#22D3EE" stroke-width="0.5" fill="none" opacity="0.2"/>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
      <path d="M 0,0 L 130,0 A 130,130 0 0,0 92,-92 Z" fill="url(#sweep)" opacity="0.6"/>
      <line x1="0" y1="0" x2="130" y2="0" stroke="#67E8F9" stroke-width="1.5" filter="url(#glow2)"/>
    </g>
    <circle r="3" fill="#67E8F9" filter="url(#glow2)"/>
  </g>
  <g filter="url(#glow2)">
    <circle cx="280" cy="90" r="2" fill="#22D3EE">
      <animate attributeName="opacity" values="0;1;1;0" dur="4s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="540" cy="200" r="2" fill="#22D3EE">
      <animate attributeName="opacity" values="0;1;1;0" dur="4s" begin="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="180" cy="220" r="2" fill="#67E8F9">
      <animate attributeName="opacity" values="0;1;1;0" dur="4s" begin="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="620" cy="80" r="2" fill="#22D3EE">
      <animate attributeName="opacity" values="0;1;1;0" dur="4s" begin="3.2s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="20" y="25" font-family="monospace" font-size="10" fill="#22D3EE" opacity="0.5">SCOPE</text>
  <text x="20" y="285" font-family="monospace" font-size="10" fill="#22D3EE" opacity="0.5">RANGE: 130</text>
  <text x="780" y="25" font-family="monospace" font-size="10" fill="#67E8F9" opacity="0.5" text-anchor="end">SCANNING</text>
  <text x="780" y="285" font-family="monospace" font-size="10" fill="#22D3EE" opacity="0.5" text-anchor="end">θ: 360°</text>
</svg>