        M0,100 Q60,40 120,100 T240,100 T360,60 T480,100 T600,140 T720,100 T840,80 T960,100 T1080,120 T1200,100;
        M0,100 Q60,80 120,100 T240,40 T360,100 T480,140 T600,100 T720,60 T840,100 T960,120 T1080,100 T1200,100;
        M0,100 Q60,100 120,100 T240,100 T360,100 T480,100 T600,100 T720,100 T840,100 T960,100 T1080,100 T1200,100"/>
    </path>
  </g>
  <text x="40" y="40" font-family="monospace" font-size="11" fill="#22D3EE" opacity="0.6">azure.frequency</text>
  <text x="40" y="180" font-family="monospace" font-size="11" fill="#22D3EE" opacity="0.6">22.3318 THz</text>
